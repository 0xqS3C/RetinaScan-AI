<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetinaScan AI | Precision Diagnostics</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.4);
            --healthy: #00e676;
            --warning: #ff1744;
            --glass: rgba(255, 255, 255, 0.7);
            --bg: #0f172a; /* Deep Space Blue */
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: #f8fafc;
            margin: 0;
            min-height: 100vh;
        }

        /* --- Header --- */
        nav {
            padding: 2rem 5%;
            display: flex;
            justify-content: center;
        }

        .brand {
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: -1px;
            background: linear-gradient(to right, #60a5fa, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        /* --- Main Layout --- */
        .app-container {
            max-width: 700px;
            margin: 0 auto;
            padding: 20px;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.4s ease;
        }

        /* --- Custom File Upload --- */
        #upload-zone {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 50px 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        #upload-zone:hover {
            border-color: var(--accent);
            background: rgba(59, 130, 246, 0.05);
        }

        #preview-img {
            max-width: 100%;
            border-radius: 16px;
            margin-top: 10px;
            display: none;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        /* --- Futuristic Button --- */
        .btn-scan {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 18px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 30px;
            box-shadow: 0 10px 20px var(--accent-glow);
            transition: 0.3s;
        }

        .btn-scan:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px var(--accent-glow);
        }

        .btn-scan:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        /* --- Result Section --- */
        .result-panel {
            margin-top: 40px;
            display: none;
            animation: fadeIn 0.6s ease-out forwards;
        }

        .status-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 100px;
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .healthy-theme { color: var(--healthy); border: 1px solid var(--healthy); background: rgba(0, 230, 118, 0.1); }
        .dr-theme { color: var(--warning); border: 1px solid var(--warning); background: rgba(255, 23, 68, 0.1); }

        .big-text { font-size: 2.2rem; font-weight: 800; margin: 0; letter-spacing: -1px; }

        /* --- Telemetry Dashboard --- */
        .telemetry {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 20px;
            padding: 20px;
            margin-top: 30px;
            font-family: 'JetBrains Mono', monospace;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .data-label { color: #94a3b8; }
        .data-val { color: var(--accent); font-weight: 700; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .hidden { display: none; }
    </style>
</head>
<body>

<nav><div class="brand">RetinaScan // Diagnostics</div></nav>

<div class="app-container">
    <div class="glass-card">
        <h2 style="margin-top: 0; font-weight: 600;">Neural Analysis</h2>
        <p style="color: #94a3b8; margin-bottom: 30px;">Initialize screening by uploading a high-resolution fundus scan.</p>

        <div id="upload-zone">
            <div id="drop-msg">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 15V3m0 0l-4 4m4-4l4 4M2 17l.621 2.485A2 2 0 004.561 21h14.878a2 2 0 001.94-1.515L22 17"/></svg>
                <p style="font-weight: 600; margin-top: 15px;">Drop Image Here</p>
                <span style="font-size: 0.8rem; opacity: 0.6;">JPG, PNG or TIFF</span>
            </div>
            <img id="preview-img">
            <input type="file" id="file-input" class="hidden" accept="image/*" onchange="handleFileSelect(event)">
        </div>

        <button id="scan-btn" class="btn-scan" onclick="runAnalysis()" disabled>WAITING FOR SYSTEM...</button>

        <div id="result-panel" class="result-panel">
            <div id="status-badge" class="status-badge">Processing...</div>
            <h1 id="main-result" class="big-text">Result</h1>
            <p id="result-desc" style="color: #94a3b8;"></p>
            
            <div class="telemetry">
                <div style="font-size: 0.7rem; color: var(--accent); margin-bottom: 10px;">CORE TELEMETRY</div>
                <div id="telemetry-content"></div>
            </div>

            <button onclick="location.reload()" style="background:none; border:none; color:#64748b; margin-top:30px; cursor:pointer; font-weight:600; text-decoration: underline;">PURGE DATA & RESET</button>
        </div>
    </div>
</div>

<script>
let model = null;
let labels = [];

async function setup() {
    try {
        model = await tf.loadLayersModel('https://teachablemachine.withgoogle.com/models/L3ReT1m2a/model.json');
        const res = await fetch('https://teachablemachine.withgoogle.com/models/L3ReT1m2a/metadata.json');
        const meta = await res.json();
        labels = meta.labels;
        document.getElementById('scan-btn').innerText = "SYSTEM READY";
    } catch(e) {
        document.getElementById('scan-btn').innerText = "MODEL ERROR";
    }
}
setup();

document.getElementById("upload-zone").addEventListener("click", () => document.getElementById("file-input").click());

function handleFileSelect(e) {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (event) => {
        const preview = document.getElementById('preview-img');
        preview.src = event.target.result;
        preview.style.display = 'block';
        document.getElementById('drop-msg').style.display = 'none';
        document.getElementById('scan-btn').innerText = "RUN NEURAL SCAN";
        document.getElementById('scan-btn').disabled = false;
        document.getElementById('result-panel').style.display = 'none';
    };
    reader.readAsDataURL(file);
}

async function runAnalysis() {
    const btn = document.getElementById('scan-btn');
    btn.disabled = true;
    btn.innerText = "PROCESSING INTERFERENCE...";

    const img = document.getElementById('preview-img');
    const scores = tf.tidy(() => {
        const tensor = tf.browser.fromPixels(img).resizeBilinear([224, 224]).toFloat().div(127.5).sub(1).expandDims(0);
        return model.predict(tensor).dataSync();
    });

    display(Array.from(scores));
    btn.innerText = "SCAN COMPLETE";
}

function display(scores) {
    const max = scores.indexOf(Math.max(...scores));
    const label = labels[max];
    
    // Logic for your specific +/- labels
    const isHealthy = label.includes('-') || label.toLowerCase().includes('healthy');

    const panel = document.getElementById('result-panel');
    const badge = document.getElementById('status-badge');
    const title = document.getElementById('main-result');
    const desc = document.getElementById('result-desc');
    const tel = document.getElementById('telemetry-content');

    panel.style.display = 'block';
    badge.className = 'status-badge ' + (isHealthy ? 'healthy-theme' : 'dr-theme');
    badge.innerText = isHealthy ? 'System Clear' : 'Alert: Signs Detected';
    
    title.innerText = isHealthy ? 'Healthy Retina' : 'Retinopathy Found';
    title.style.color = isHealthy ? 'var(--healthy)' : 'var(--warning)';
    
    desc.innerText = isHealthy 
        ? "Neural patterns indicate zero structural irregularities." 
        : "Automated scan detected microaneurysms or leakage markers.";

    tel.innerHTML = labels.map((l, i) => `
        <div class="data-row">
            <span class="data-label">${l}</span>
            <span class="data-val">${(scores[i]*100).toFixed(2)}%</span>
        </div>
    `).join('');

    panel.scrollIntoView({ behavior: 'smooth' });
}
</script>
</body>
</html>
